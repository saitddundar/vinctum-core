syntax = "proto3";

package gateway.v1;

option go_package = "github.com/saitddundar/vinctum-core/proto/gateway/v1;gatewayv1";

import "google/protobuf/timestamp.proto";

// GatewayService acts as the unified entry point for external clients.
// It proxies HTTP/REST requests into the internal gRPC microservices.
service GatewayService {
  // Health check endpoint.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // Returns status of all backend services.
  rpc GetServiceStatus(GetServiceStatusRequest) returns (GetServiceStatusResponse);
}

// ─── HealthCheck ─────────────────────────────────────────

message HealthCheckRequest {}

message HealthCheckResponse {
  bool   healthy = 1;
  string version = 2;
  google.protobuf.Timestamp timestamp = 3;
}

// ─── GetServiceStatus ────────────────────────────────────

message GetServiceStatusRequest {}

message GetServiceStatusResponse {
  repeated ServiceStatus services = 1;
}

message ServiceStatus {
  string name    = 1;
  bool   healthy = 2;
  string address = 3;
  int64  latency_ms = 4;
}
