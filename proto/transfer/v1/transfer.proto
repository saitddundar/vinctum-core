syntax = "proto3";

package transfer.v1;

option go_package = "github.com/saitddundar/vinctum-core/proto/transfer/v1;transferv1";

import "google/protobuf/timestamp.proto";
import "routing/v1/routing.proto";

service TransferService {
  // Initiates a new file/data transfer session.
  rpc InitiateTransfer(InitiateTransferRequest) returns (InitiateTransferResponse);

  // Streams encrypted data chunks from sender to the service (client streaming).
  rpc SendChunk(stream SendChunkRequest) returns (SendChunkResponse);

  // Streams encrypted data chunks to the receiver (server streaming).
  rpc ReceiveChunks(ReceiveChunksRequest) returns (stream DataChunk);

  // Queries the current status of a transfer.
  rpc GetTransferStatus(GetTransferStatusRequest) returns (GetTransferStatusResponse);

  // Lists transfers associated with a node.
  rpc ListTransfers(ListTransfersRequest) returns (ListTransfersResponse);

  // Cancels an in-progress transfer.
  rpc CancelTransfer(CancelTransferRequest) returns (CancelTransferResponse);

  // Streams transfer events (new/updated/completed) for a given node so
  // receivers can react to incoming transfers without polling.
  rpc WatchTransfers(WatchTransfersRequest) returns (stream TransferEvent);
}

// ─── InitiateTransfer ────────────────────────────────────

message InitiateTransferRequest {
  string sender_node_id   = 1;
  string receiver_node_id = 2;
  string filename          = 3;
  int64  total_size_bytes  = 4;
  string content_hash      = 5; // SHA-256 hash of the entire payload
  string encryption_key    = 6 [deprecated = true]; // DEPRECATED: must be empty. Chunks are E2E encrypted client-side; the server rejects requests that include a key.
  int32  chunk_size_bytes  = 7; // Size per chunk in bytes (default: 256KB)
  int32  replication_factor = 8; // Number of copies across the network (default: 1)
}

message InitiateTransferResponse {
  string transfer_id  = 1;
  int32  total_chunks = 2;
  TransferStatus status = 3;
  google.protobuf.Timestamp created_at = 4;
  repeated routing.v1.RouteHop route_hops = 5; // Computed route for this transfer
}

// ─── SendChunk ───────────────────────────────────────────

message SendChunkRequest {
  string transfer_id = 1;
  int32  chunk_index = 2;
  bytes  data        = 3; // Ciphertext chunk (client-side AES-256-GCM); the server never sees plaintext.
  string chunk_hash  = 4; // SHA-256 of the ciphertext for transport integrity.
}

message SendChunkResponse {
  string transfer_id     = 1;
  int32  chunks_received = 2;
  int32  total_chunks    = 3;
  TransferStatus status  = 4;
}

// ─── ReceiveChunks ───────────────────────────────────────

message ReceiveChunksRequest {
  string transfer_id      = 1;
  int32  start_chunk      = 2; // Starting chunk index for resumable downloads
  string receiver_node_id = 3;
}

message DataChunk {
  string transfer_id = 1;
  int32  chunk_index = 2;
  bytes  data        = 3;
  string chunk_hash  = 4;
  bool   is_last     = 5;
}

// ─── GetTransferStatus ───────────────────────────────────

message GetTransferStatusRequest {
  string transfer_id = 1;
}

message GetTransferStatusResponse {
  string transfer_id        = 1;
  TransferStatus status     = 2;
  int32  chunks_transferred = 3;
  int32  total_chunks       = 4;
  int64  bytes_transferred  = 5;
  int64  total_bytes        = 6;
  google.protobuf.Timestamp started_at  = 7;
  google.protobuf.Timestamp updated_at  = 8;
}

// ─── ListTransfers ───────────────────────────────────────

message ListTransfersRequest {
  string node_id = 1; // List transfers belonging to this node
  TransferStatus filter_status = 2;
}

message ListTransfersResponse {
  repeated TransferInfo transfers = 1;
}

message TransferInfo {
  string transfer_id       = 1;
  string sender_node_id    = 2;
  string receiver_node_id  = 3;
  string filename          = 4;
  int64  total_size_bytes  = 5;
  TransferStatus status    = 6;
  int32  progress_percent  = 7;
  google.protobuf.Timestamp created_at = 8;
}

// ─── CancelTransfer ─────────────────────────────────────

message CancelTransferRequest {
  string transfer_id = 1;
  string reason       = 2;
}

message CancelTransferResponse {
  bool   success = 1;
  string message = 2;
}

// ─── WatchTransfers ─────────────────────────────────────

message WatchTransfersRequest {
  string node_id = 1; // Watch transfers where this node is sender or receiver
  // If true, only events where this node is the receiver will be emitted.
  // Useful for receivers that only care about incoming transfers.
  bool   receiver_only = 2;
}

message TransferEvent {
  EventType type = 1;
  TransferInfo transfer = 2;
  google.protobuf.Timestamp timestamp = 3;

  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_NEW         = 1; // First time we see this transfer
    EVENT_TYPE_UPDATED     = 2; // Status or progress changed
    EVENT_TYPE_COMPLETED   = 3; // Reached terminal completed state
    EVENT_TYPE_CANCELLED   = 4; // Reached terminal cancelled/failed state
  }
}

// ─── Enums ──────────────────────────────────────────────

enum TransferStatus {
  TRANSFER_STATUS_UNSPECIFIED = 0;
  TRANSFER_STATUS_PENDING     = 1;
  TRANSFER_STATUS_IN_PROGRESS = 2;
  TRANSFER_STATUS_COMPLETED   = 3;
  TRANSFER_STATUS_FAILED      = 4;
  TRANSFER_STATUS_CANCELLED   = 5;
}
