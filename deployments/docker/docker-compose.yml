services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vinctum
      POSTGRES_PASSWORD: vinctum
      POSTGRES_DB: vinctum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinctum"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  identity:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.identity
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      VINCTUM_SERVICE_NAME: identity-service
      VINCTUM_GRPC_PORT: 50051
      VINCTUM_DATABASE_DSN: postgres://vinctum:vinctum@postgres:5432/vinctum?sslmode=disable
      VINCTUM_AUTH_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "50051:50051"

  discovery:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.discovery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      VINCTUM_SERVICE_NAME: discovery-service
      VINCTUM_GRPC_PORT: 50052
      VINCTUM_DATABASE_DSN: postgres://vinctum:vinctum@postgres:5432/vinctum?sslmode=disable
    ports:
      - "50052:50052"

  routing:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.routing
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      VINCTUM_SERVICE_NAME: routing-service
      VINCTUM_GRPC_PORT: 50053
      VINCTUM_DATABASE_DSN: postgres://vinctum:vinctum@postgres:5432/vinctum?sslmode=disable
      VINCTUM_AUTH_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "50053:50053"

  transfer:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.transfer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      VINCTUM_SERVICE_NAME: transfer-service
      VINCTUM_GRPC_PORT: 50054
      VINCTUM_DATABASE_DSN: postgres://vinctum:vinctum@postgres:5432/vinctum?sslmode=disable
      VINCTUM_AUTH_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "50054:50054"

  gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.gateway
    restart: unless-stopped
    depends_on:
      - identity
      - discovery
      - routing
      - transfer
    environment:
      VINCTUM_SERVICE_NAME: gateway-service
      VINCTUM_GATEWAY_HTTP_PORT: 8080
      VINCTUM_GATEWAY_IDENTITY_ADDR: identity:50051
      VINCTUM_GATEWAY_DISCOVERY_ADDR: discovery:50052
      VINCTUM_GATEWAY_ROUTING_ADDR: routing:50053
      VINCTUM_GATEWAY_TRANSFER_ADDR: transfer:50054
      VINCTUM_AUTH_JWT_SECRET: ${JWT_SECRET}
      VINCTUM_CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8081,http://localhost:8082
    ports:
      - "8080:8080"

volumes:
  postgres_data:
